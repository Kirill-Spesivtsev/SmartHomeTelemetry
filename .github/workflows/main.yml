name: SmartHomeTelemetry CI/CD 

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  test:
    name: Test / ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ApiGateway
            project: Tests/ApiGateway.Tests/ApiGateway.Tests.csproj

          - name: DataIngestor
            project: Tests/DataIngestor.Tests/DataIngestor.Tests.csproj

          - name: DataProcessor
            project: Tests/DataProcessor.Tests/DataProcessor.Tests.csproj

          - name: NotificationService
            project: Tests/NotificationService.Tests/NotificationService.Tests.csproj

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Test
        run: |
          dotnet test ${{ matrix.project }} \
            --configuration Release \
            --logger "trx;LogFileName=results.trx" \
            --results-directory ./test-results \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=lcov \
            /p:CoverletOutput=./test-results/lcov.info

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.name }}
          path: ./test-results/

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/telemetry-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: Frontend/telemetry-dashboard
        run: npm ci

      - name: Build
        working-directory: Frontend/telemetry-dashboard
        run: npm run build
        env:
          CI: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/telemetry-dashboard/dist/

  build-images:
    name: Docker / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: weak-app
            context: WeakApp
            dockerfile: WeakApp/Dockerfile

          - service: data-ingestor
            context: DataIngestor
            dockerfile: DataIngestor/Dockerfile

          - service: data-processor
            context: DataProcessor
            dockerfile: DataProcessor/DataProcessor.Api/Dockerfile

          - service: api-gateway
            context: ApiGateway
            dockerfile: ApiGateway/ApiGateway.Api/Dockerfile

          - service: notification-service
            context: NotificationService
            dockerfile: NotificationService/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/sht-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
