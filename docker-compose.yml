services:

  weakapp:
    container_name: weak-app
    build:
      context: ./WeakApp
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq: 
    container_name: rabbitmq
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dataingestor:
    image: ${DOCKER_REGISTRY-}dataingestor
    build:
      context: .
      dockerfile: DataIngestor/Dockerfile
    ports:
      - "7003:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      UnstableApi__BaseUrl: ${UNSTABLEAPI_BASEURL:-http://weakapp:8080}
      UnstableApi__ApiKey: ${UNSTABLEAPI_APIKEY}
      TelemetryFetch__IntervalSeconds: ${TELEMETRYFETCH_INTERVALSECONDS}
      TelemetryFetch__BatchSize: ${TELEMETRYFETCH_BATCHSIZE}
      RabbitMq__Host: ${RABBITMQ_HOST}
      RabbitMq__Username: ${RABBITMQ_USERNAME}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
    depends_on:
      weakapp:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  dataprocessor.api:
    image: ${DOCKER_REGISTRY-}dataprocessorapi
    build:
      context: .
      dockerfile: DataProcessor/DataProcessor.Api/Dockerfile

  apigateway.api:
    image: ${DOCKER_REGISTRY-}apigatewayapi
    build:
      context: .
      dockerfile: ApiGateway/ApiGateway.Api/Dockerfile

  notificationservice:
    image: ${DOCKER_REGISTRY-}notificationservice
    build:
      context: .
      dockerfile: NotificationService/Dockerfile

volumes:
  rabbitmq-data:

