name: smart-home-telemetry

services:
  weakapp:
    container_name: weak-app
    image: ghcr.io/kirill-spesivtsev/sht-weak-app:latest
    ports:
      - "5000:8080"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    container_name: postgres.db
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  dataingestor:
    container_name: data-ingestor
    image: ghcr.io/kirill-spesivtsev/sht-data-ingestor:latest
    ports:
      - "7003:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      UnstableApi__BaseUrl: ${UNSTABLEAPI_BASEURL:-http://weakapp:8080}
      UnstableApi__ApiKey: ${UNSTABLEAPI_APIKEY}
      TelemetryFetch__IntervalSeconds: ${TELEMETRYFETCH_INTERVALSECONDS}
      TelemetryFetch__BatchSize: ${TELEMETRYFETCH_BATCHSIZE}
      RabbitMq__Host: ${RABBITMQ_HOST}
      RabbitMq__Username: ${RABBITMQ_USERNAME}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
    networks:
      - internal
    depends_on:
      weakapp:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  dataprocessor.api:
    container_name: data-processor
    image: ghcr.io/kirill-spesivtsev/sht-data-processor:latest
    ports:
      - "7002:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      RabbitMq__Host: ${RABBITMQ_HOST}
      RabbitMq__Username: ${RABBITMQ_USERNAME}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      ConnectionStrings__Postgres: ${CONNECTIONSTRINGS_POSTGRES}
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  apigateway.api:
    container_name: api-gateway.api
    image: ghcr.io/kirill-spesivtsev/sht-api-gateway:latest
    ports:
      - "7000:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: ${CONNECTIONSTRINGS_POSTGRES}
      Cors__AllowedOrigins: ${APIGATEWAY_CORS_ALLOWEDORIGINS}
    restart: unless-stopped
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy

  notificationservice:
    container_name: notification-service
    image: ghcr.io/kirill-spesivtsev/sht-notification-service:latest
    ports:
      - "7001:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      RabbitMq__Host: ${RABBITMQ_HOST}
      RabbitMq__Username: ${RABBITMQ_USERNAME}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
    restart: unless-stopped
    networks:
      - internal
      - public
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    container_name: telemetry-dashboard
    image: ghcr.io/kirill-spesivtsev/sht-frontend:latest
    ports:
      - "3000:80"
    networks:
      - internal
      - public
    depends_on:
      apigateway.api:
        condition: service_started
      notificationservice:
        condition: service_started

networks:
  internal:
    internal: true
  public:
    internal: false

volumes:
  postgres-data:
  pgadmin-data:
  rabbitmq-data:

